<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Species Overview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .menu-bar {
            background-color: #f0f0f0;
            padding: 5px;
            border-bottom: 1px solid #ccc;
        }
        .menu {
            display: inline-block;
            position: relative;
            margin-right: 20px;
        }
        .menu > button {
            background: none;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .menu > button:hover {
            background-color: #e0e0e0;
        }
        .submenu {
            display: none;
            position: absolute;
            background-color: white;
            border: 1px solid #ccc;
            min-width: 120px;
            z-index: 1;
        }
        .submenu button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            padding: 8px 12px;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
        }
        .submenu button:hover {
            background-color: #f0f0f0;
        }
        .table-container {
            overflow: auto;
            max-height: 80vh;
            max-width: 100vw;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
        }
        .sr-column {
            background-color: #f9f9f9;
            font-weight: bold;
            width: 50px;
        }
        .editable-cell {
            cursor: text;
        }
        .editable-cell:focus {
            outline: 2px solid #007bff;
        }
    </style>
</head>
<body>
    <div class="menu-bar">
        <button id="save-icon-btn" title="Save" style="background:none;border:none;font-size:18px;vertical-align:middle;cursor:pointer;margin-right:20px;">💾</button>
        <div class="menu">
            <button id="file-menu">File</button>
            <div class="submenu" id="file-submenu">
                <button id="new-file">New</button>
                <button id="load-file">Load</button>
                <button id="save-file">Save</button>
                <button id="export-csv">Export CSV</button>
                <button id="import-csv">Import CSV</button>
            </div>
        </div>
        <div class="menu">
            <button id="edit-menu">Edit</button>
            <div class="submenu" id="edit-submenu">
                <button id="add-row">Add Row</button>
                <button id="delete-row">Delete Row</button>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table id="data-table">
            <thead id="table-head">
                <!-- Headers will be generated here -->
            </thead>
            <tbody id="table-body">
                <!-- Rows will be generated here -->
            </tbody>
        </table>
    </div>

    <input type="file" id="file-input" style="display: none;" accept=".html">
    <input type="file" id="csv-input" style="display: none;" accept=".csv">

    <script>
        // Configuration
       let columnTitles = ["Marathi","Latin", "English", "Use", "Propagation","Sunlight","Life"];
        
        const initialRowCount = 10;

        let currentRowCount = initialRowCount;

        // DOM elements
        const table = document.getElementById('data-table');
        const tableHead = document.getElementById('table-head');
        const tableBody = document.getElementById('table-body');
        const fileInput = document.getElementById('file-input');

        // Menu elements
        const fileMenu = document.getElementById('file-menu');
        const fileSubmenu = document.getElementById('file-submenu');
        const editMenu = document.getElementById('edit-menu');
        const editSubmenu = document.getElementById('edit-submenu');

        // Menu button elements
        const newFileBtn = document.getElementById('new-file');
        const loadFileBtn = document.getElementById('load-file');
        const saveFileBtn = document.getElementById('save-file');
        const exportCsvBtn = document.getElementById('export-csv');
        const importCsvBtn = document.getElementById('import-csv');
        const saveIconBtn = document.getElementById('save-icon-btn');
        const addRowBtn = document.getElementById('add-row');
        const deleteRowBtn = document.getElementById('delete-row');
        const csvInput = document.getElementById('csv-input');
        // CSV Export
        function exportToCSV() {
            let csv = [];
            // Header row
            let header = ['Sr', ...columnTitles];
            csv.push(header.join(','));
            // Data rows
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                let rowData = [];
                cells.forEach(cell => {
                    // Escape quotes and commas
                    let text = cell.textContent.replace(/"/g, '""');
                    if (text.includes(',') || text.includes('"') || text.includes('\n')) {
                        text = '"' + text + '"';
                    }
                    rowData.push(text);
                });
                csv.push(rowData.join(','));
            });
            const csvContent = csv.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'table_data.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // CSV Import
        function importFromCSV() {
            csvInput.click();
        }

        function handleCSVLoad(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    const lines = content.split(/\r?\n/).filter(line => line.trim() !== '');
                    if (lines.length < 2) return;
                    // Parse header
                    const header = parseCSVLine(lines[0]);
                    // Remove 'Sr' if present
                    let startIdx = 0;
                    if (header[0] === 'Sr') startIdx = 1;
                    columnTitles = header.slice(startIdx);
                    generateHeaders();
                    // Parse rows
                    tableBody.innerHTML = '';
                    let count = 0;
                    for (let i = 1; i < lines.length; i++) {
                        const row = parseCSVLine(lines[i]);
                        if (row.length === 0) continue;
                        // Data row
                        if (row[0] !== 'Rem') {
                            const tr = document.createElement('tr');
                            const srCell = document.createElement('td');
                            srCell.className = 'sr-column';
                            srCell.textContent = row[0];
                            tr.appendChild(srCell);
                            for (let j = 1; j < row.length; j++) {
                                const cell = document.createElement('td');
                                cell.className = 'editable-cell';
                                cell.contentEditable = 'true';
                                cell.textContent = row[j];
                                tr.appendChild(cell);
                            }
                            tableBody.appendChild(tr);
                            count++;
                        } else {
                            // Remarks row
                            const tr = document.createElement('tr');
                            const srCell = document.createElement('td');
                            srCell.className = 'sr-column';
                            srCell.textContent = 'Rem';
                            tr.appendChild(srCell);
                            const remCell = document.createElement('td');
                            remCell.className = 'editable-cell';
                            remCell.contentEditable = 'true';
                            remCell.colSpan = columnTitles.length;
                            remCell.textContent = row[1] || '';
                            tr.appendChild(remCell);
                            tableBody.appendChild(tr);
                        }
                    }
                    currentRowCount = count;
                    updateSerialNumbers();
                };
                reader.readAsText(file);
            }
        }

        // Helper to parse a CSV line (handles quoted fields)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (i + 1 < line.length && line[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        current += char;
                    }
                } else {
                    if (char === ',') {
                        result.push(current);
                        current = '';
                    } else if (char === '"') {
                        inQuotes = true;
                    } else {
                        current += char;
                    }
                }
            }
            result.push(current);
            return result;
        }

        // Initialize table
        function initializeTable() {
            const existingHeaders = tableHead.querySelectorAll('th');
            const existingRows = tableBody.querySelectorAll('tr');

            if (existingHeaders.length > 0 && existingRows.length > 0) {
                // Restore columnTitles from existing headers
                const titles = [];
                for (let i = 1; i < existingHeaders.length; i++) {
                    titles.push(existingHeaders[i].textContent);
                }
                columnTitles = titles;
                let count = 0;
                existingRows.forEach(row => {
                    const sr = row.querySelector('.sr-column');
                    if (sr && sr.textContent !== 'Rem') count++;
                });
                currentRowCount = count;
            } else {
                generateHeaders();
                generateRows(initialRowCount);
            }
            updateSerialNumbers();
        }

        // Generate table headers
        function generateHeaders() {
            const headerRow = document.createElement('tr');

            // Sr column
            const srHeader = document.createElement('th');
            srHeader.textContent = 'Sr';
            srHeader.className = 'sr-column';
            headerRow.appendChild(srHeader);

            // Data columns
            columnTitles.forEach(title => {
                const th = document.createElement('th');
                th.textContent = title;
                headerRow.appendChild(th);
            });

            tableHead.innerHTML = '';
            tableHead.appendChild(headerRow);
        }

        // Generate table rows
        function generateRows(count) {
            tableBody.innerHTML = '';
            for (let i = 0; i < count; i++) {
                // Data record row
                const row = document.createElement('tr');
                const srCell = document.createElement('td');
                srCell.className = 'sr-column';
                row.appendChild(srCell);

                columnTitles.forEach(() => {
                    const cell = document.createElement('td');
                    cell.className = 'editable-cell';
                    cell.contentEditable = 'true';
                    cell.textContent = '';
                    row.appendChild(cell);
                });
                tableBody.appendChild(row);

                // Remarks row
                const remRow = document.createElement('tr');
                const remSrCell = document.createElement('td');
                remSrCell.className = 'sr-column';
                remSrCell.textContent = 'Rem';
                remRow.appendChild(remSrCell);

                const remCell = document.createElement('td');
                remCell.className = 'editable-cell';
                remCell.contentEditable = 'true';
                remCell.colSpan = columnTitles.length;
                remCell.textContent = '';
                remRow.appendChild(remCell);
                tableBody.appendChild(remRow);
            }
            currentRowCount = count;
            updateSerialNumbers();
        }

        // Update serial numbers
        function updateSerialNumbers() {
            const rows = tableBody.querySelectorAll('tr');
            let srCounter = 1;
            rows.forEach((row) => {
                const srCell = row.querySelector('.sr-column');
                if (srCell.textContent !== 'Rem') {
                    srCell.textContent = (srCounter++).toString();
                }
            });
        }

        // Handle keyboard navigation
        function handleKeyNavigation(event) {
            if (event.target.classList.contains('editable-cell')) {
                const cell = event.target;
                const row = cell.parentElement;
                const cellIndex = Array.from(row.children).indexOf(cell);
                const isRemarksRow = row.querySelector('.sr-column').textContent === 'Rem';
                let nextCell = null;

                switch (event.key) {
                    case 'ArrowUp':
                        event.preventDefault();
                        const prevRow = row.previousElementSibling;
                        if (prevRow) {
                            if (isRemarksRow) {
                                const targetIndex = cell.lastDataIndex || 1;
                                nextCell = prevRow.children[targetIndex];
                            } else {
                                nextCell = prevRow.children[1];
                                if (nextCell) nextCell.lastDataIndex = cellIndex;
                            }
                        }
                        break;
                    case 'ArrowDown':
                        event.preventDefault();
                        const nextRow = row.nextElementSibling;
                        if (nextRow) {
                            if (isRemarksRow) {
                                const targetIndex = cell.lastDataIndex || 1;
                                nextCell = nextRow.children[targetIndex];
                            } else {
                                nextCell = nextRow.children[1];
                                if (nextCell) nextCell.lastDataIndex = cellIndex;
                            }
                        }
                        break;
                    case 'ArrowLeft':
                        if (!isRemarksRow) {
                            event.preventDefault();
                            if (cellIndex > 1) { // Skip Sr column
                                nextCell = row.children[cellIndex - 1];
                            } else if (cellIndex === 1) { // Wrap to last cell
                                nextCell = row.children[row.children.length - 1];
                            }
                        }
                        break;
                    case 'ArrowRight':
                        if (!isRemarksRow) {
                            event.preventDefault();
                            if (cellIndex < row.children.length - 1) {
                                nextCell = row.children[cellIndex + 1];
                            } else if (cellIndex === row.children.length - 1) { // Wrap to first cell
                                nextCell = row.children[1];
                            }
                        }
                        break;
                }

                if (nextCell && nextCell.classList.contains('editable-cell')) {
                    nextCell.focus();
                    // Move cursor to end of content
                    const range = document.createRange();
                    const selection = window.getSelection();
                    range.selectNodeContents(nextCell);
                    range.collapse(false);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }
        }

        // Menu functionality
        function toggleSubmenu(submenu) {
            const allSubmenus = document.querySelectorAll('.submenu');
            allSubmenus.forEach(menu => {
                if (menu !== submenu) {
                    menu.style.display = 'none';
                }
            });
            submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
        }

        function addRow() {
            // Data record row
            const newRow = document.createElement('tr');
            const srCell = document.createElement('td');
            srCell.className = 'sr-column';
            newRow.appendChild(srCell);

            columnTitles.forEach(() => {
                const cell = document.createElement('td');
                cell.className = 'editable-cell';
                cell.contentEditable = 'true';
                cell.textContent = '';
                newRow.appendChild(cell);
            });
            tableBody.appendChild(newRow);

            // Remarks row
            const remRow = document.createElement('tr');
            const remSrCell = document.createElement('td');
            remSrCell.className = 'sr-column';
            remSrCell.textContent = 'Rem';
            remRow.appendChild(remSrCell);

            const remCell = document.createElement('td');
            remCell.className = 'editable-cell';
            remCell.contentEditable = 'true';
            remCell.colSpan = columnTitles.length;
            remCell.textContent = '';
            remRow.appendChild(remCell);
            tableBody.appendChild(remRow);

            updateSerialNumbers();
            currentRowCount++;
        }

        function deleteRow() {
            if (currentRowCount > 1) {
                // Remove both remarks row and data row
                tableBody.removeChild(tableBody.lastElementChild);
                tableBody.removeChild(tableBody.lastElementChild);
                currentRowCount--;
            }
        }

        function newFile() {
            if (confirm('Are you sure you want to create a new file? All unsaved changes will be lost.')) {
                generateRows(initialRowCount);
                updateSerialNumbers();
            }
        }

        function loadFile() {
            fileInput.click();
        }

        function handleFileLoad(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    // Parse the HTML content and extract table data
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(content, 'text/html');
                    const loadedTable = doc.querySelector('#data-table');

                    if (loadedTable) {
                        // Extract column titles
                        const loadedHeaders = loadedTable.querySelectorAll('th');
                        const newColumnTitles = [];
                        for (let i = 1; i < loadedHeaders.length; i++) { // Skip Sr column
                            newColumnTitles.push(loadedHeaders[i].textContent);
                        }

                        // Update column titles and regenerate table
                        columnTitles = newColumnTitles;
                        generateHeaders();

                        // Extract row data
                        const loadedRows = loadedTable.querySelectorAll('tbody tr');
                        tableBody.innerHTML = '';

                        loadedRows.forEach((loadedRow) => {
                            const newRow = document.createElement('tr');
                            const srCell = document.createElement('td');
                            srCell.className = 'sr-column';
                            const srText = loadedRow.querySelector('.sr-column').textContent;
                            srCell.textContent = srText;
                            newRow.appendChild(srCell);

                            if (srText === 'Rem') {
                                const cell = document.createElement('td');
                                cell.className = 'editable-cell';
                                cell.contentEditable = 'true';
                                cell.colSpan = columnTitles.length;
                                cell.textContent = loadedRow.cells[1] ? loadedRow.cells[1].textContent : '';
                                newRow.appendChild(cell);
                            } else {
                                const loadedCells = loadedRow.querySelectorAll('td.editable-cell');
                                loadedCells.forEach(lc => {
                                    const cell = document.createElement('td');
                                    cell.className = 'editable-cell';
                                    cell.contentEditable = 'true';
                                    cell.textContent = lc.textContent;
                                    newRow.appendChild(cell);
                                });
                            }
                            tableBody.appendChild(newRow);
                        });

                        let count = 0;
                        tableBody.querySelectorAll('tr').forEach(r => {
                            if (r.querySelector('.sr-column').textContent !== 'Rem') count++;
                        });
                        currentRowCount = count;
                    }
                };
                reader.readAsText(file);
            }
        }

        function saveFile() {
            // Close any open submenus before saving
            document.querySelectorAll('.submenu').forEach(m => m.style.display = 'none');

            // Generate HTML content by capturing the entire document state
            const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

            // Create blob and download
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'table_data.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Event listeners
        document.addEventListener('keydown', handleKeyNavigation);

        fileMenu.addEventListener('click', () => toggleSubmenu(fileSubmenu));
        editMenu.addEventListener('click', () => toggleSubmenu(editSubmenu));

        newFileBtn.addEventListener('click', newFile);
        loadFileBtn.addEventListener('click', loadFile);
        saveFileBtn.addEventListener('click', saveFile);

        addRowBtn.addEventListener('click', addRow);
        deleteRowBtn.addEventListener('click', deleteRow);
        saveIconBtn.addEventListener('click', saveFile);
        exportCsvBtn.addEventListener('click', exportToCSV);
        importCsvBtn.addEventListener('click', importFromCSV);

        fileInput.addEventListener('change', handleFileLoad);
        csvInput.addEventListener('change', handleCSVLoad);

        // Close submenus when clicking outside
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.menu')) {
                document.querySelectorAll('.submenu').forEach(menu => {
                    menu.style.display = 'none';
                });
            }
        });

        // Initialize the table when the page loads
        initializeTable();
    </script>
</body>
</html>
